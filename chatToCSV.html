<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WhatsApp Chat to CSV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; max-width: 700px; margin: auto; }
    .option-group { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin: 10px 0; }
    input, button { margin-top: 10px; padding: 8px; font-size: 16px; }
    label { cursor: pointer; margin-right: 15px; }
    #status { margin-top: 10px; color: green; font-weight: bold; }
    #tdata { margin-top: 20px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>WhatsApp Chat Cleaner & CSV Exporter</h2>
  
  <input type="file" id="fileInput" accept=".txt" />

  <div class="option-group">
    <p><strong>Extraction Starting Point:</strong></p>
    <input type="radio" id="optAuto" name="extractOpt" value="auto" checked>
    <label for="optAuto">Auto-detect from Last Line (GAS)</label>
    <br>
    <input type="radio" id="optDate" name="extractOpt" value="manual">
    <label for="optDate">Start from specific Date:</label>
    <input type="date" id="manualDate" />
  </div>

  <button id="processBtn">Process & Download CSV</button>
  <p id="status"></p>
  <div id='tdata'></div>

  <script>
    const FILE_INPUT = document.getElementById("fileInput");
    const PROCESS_BTN = document.getElementById("processBtn");
    const STATUS = document.getElementById("status");
    const MANUAL_DATE_INPUT = document.getElementById("manualDate");
    const OPT_AUTO = document.getElementById("optAuto");

    const TIMESTAMP_REGEX = /^\[\d{2}\/\d{2}\/\d{4}, \d{2}:\d{2}:\d{2}\]/;
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzGpguV0hLcJzvU2PLC70zaSJqiw-MPxtD_QKlKsuDV-s7UYb0EPMIYf_gTeoRCeA2cXg/exec";

    function formatDateForWhatsApp(dateStr) {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    async function getLastLine() {
      try {
        const res = await fetch(GAS_URL);
        const json = await res.json();
        if (Array.isArray(json) && json.length > 0 && Array.isArray(json[json.length - 1])) {
          const match = json[json.length - 1][0].match(TIMESTAMP_REGEX);
          return match ? match[0] : null;
        }
      } catch (err) {
        console.error("Fallback to default line:", err);
      }
      return "[14/07/2025, 10:45:44]"; 
    }

    function cleanLine(line) {
      return line
        .replace(/["'*]/g, "")
        .replace(/<This message was edited>/gi, "")
        .replace(/\u200e|\u202f|\u200b/g, "")
        .trim();
    }

    function downloadCSV(data) {
      const csvContent = data.map(row => `"${row.replace(/"/g, '""')}"`).join("\n");
      const blob = new Blob([csvContent], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "whatsapp_cleaned.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function processFile() {
      const file = FILE_INPUT.files[0];
      if (!file) {
        alert("Please select a WhatsApp .txt file.");
        return;
      }

      STATUS.textContent = "Processing...";
      let tabledata = `<table border=1 style='border-collapse:collapse'>`;
      const fileText = await file.text();
      const lines = fileText.split(/\r?\n/);
      
      let searchString = "";
      
      if (OPT_AUTO.checked) {
        searchString = await getLastLine();
        searchString = searchString.trim();
      } else {
        const rawDate = MANUAL_DATE_INPUT.value;
        if (!rawDate) {
          alert("Please select a date.");
          STATUS.textContent = "";
          return;
        }
        searchString = "[" + formatDateForWhatsApp(rawDate);
      }

      let startIndex = lines.findIndex(line => line.includes(searchString));
      
      if (startIndex === -1) {
        alert(`Could not find "${searchString}" in the file. Processing from beginning.`);
        startIndex = 0;
      }

      const newLines = lines.slice(startIndex).map(cleanLine).filter(line => line !== "");
      let messages = [];
      let current = "";

      for (let line of newLines) {
        if (TIMESTAMP_REGEX.test(line)) {
          if (current) {
            messages.push(current.trim());
            tabledata += `<tr><td>${current}</td></tr>`;
          }
          current = line;
        } else {
          current += " " + line + '\n';
        }
      }
      
      if (current) {
        messages.push(current.trim());
        tabledata += `<tr><td>${current}</td></tr>`;
      }
      
      tabledata += `</table>`;
      document.getElementById('tdata').innerHTML = tabledata;

      if (messages.length === 0) {
        STATUS.textContent = "No messages found matching the criteria.";
        return;
      }

      downloadCSV(messages);
      STATUS.textContent = `${messages.length} messages exported successfully.`;
    }

    PROCESS_BTN.addEventListener("click", processFile);
  </script>
</body>
</html>

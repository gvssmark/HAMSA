    <script>
        async function downloadData() {
            try {
                // Fetch latest data
                const response = await fetch('https://script.google.com/macros/s/AKfycbzGpguV0hLcJzvU2PLC70zaSJqiw-MPxtD_QKlKsuDV-s7UYb0EPMIYf_gTeoRCeA2cXg/exec');
                const latestData = await response.json();
                // Combine all data (remove first item from each)
               const allData = [...all0.slice(1),  ...all1.slice(1),  ...latestData.slice(1)];
                 // Sort by date/time and download
                downloadSortedData(allData);
            } catch (error) {
                console.error('Download failed:', error);
            }
        }

        function downloadSortedData(data) {
            const regex = /\[(\d{2})\/(\d{2})\/(\d{4}), (\d{2}):(\d{2}):(\d{2})\]/;
            const sortedText = data
                .map(item => item[0])
                .sort((a, b) => {
                    const matchA = a.match(regex);
                    const matchB = b.match(regex);
                    if (!matchA || !matchB) return 0;
                    const dateA = new Date(`${matchA[3]}-${matchA[2]}-${matchA[1]}T${matchA[4]}:${matchA[5]}:${matchA[6]}`);
                    const dateB = new Date(`${matchB[3]}-${matchB[2]}-${matchB[1]}T${matchB[4]}:${matchB[5]}:${matchB[6]}`);
                    // Latest date first, then oldest time first for same day
                    return dateA.toDateString() !== dateB.toDateString() 
                        ? dateB - dateA 
                        : dateA - dateB;
                })
                .join('\n\n🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹\n\n');
            
            // Create and trigger download
            const blob = new Blob([sortedText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'PadyaSoundaryam.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-run on page load
        downloadData();
    </script>

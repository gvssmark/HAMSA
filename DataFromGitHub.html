<script>

async function dnld() {

    console.clear();

    downloadCSV(data);

function downloadCSV(data) {

    const regex = /\[(\d{2})\/(\d{2})\/(\d{4}), (\d{2}):(\d{2}):(\d{2})\]/;

    const sorted = data
        .map(subArray => subArray[0])
        .sort((a, b) => {

            const matchA = a.match(regex);
            const matchB = b.match(regex);

            if (!matchA || !matchB) return 0;

            const dateA = new Date(`${matchA[3]}-${matchA[2]}-${matchA[1]}T${matchA[4]}:${matchA[5]}:${matchA[6]}`);
            const dateB = new Date(`${matchB[3]}-${matchB[2]}-${matchB[1]}T${matchB[4]}:${matchB[5]}:${matchB[6]}`);

            // Different dates → latest first
            if (dateA.toDateString() !== dateB.toDateString()) {
                return dateB - dateA;
            }

            // Same date → oldest time first
            return dateA - dateB;
        })
        .join('\n\n🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹🌹');

    const blob = new Blob([sorted], { type: "text/plain" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "DataFromGitHub.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

dnld();

</script>
